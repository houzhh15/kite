# KITE — CI (T13 step-15a)
#
# release 任务矩阵 (windows-2022 + macos-13):
#   1. checkout + 装 Rust + npm ci + npm run build (含 check-console)
#   2. cargo tauri build --release (Rust 5 项强制参数生效)
#   3. npm run check-perf-budget (bundle 体积 + Cargo profile)
#   4. npm run measure-cold-start --manual (perf 数字落入 docs/perf.md)
#      注: 真机 spawn 在受限 runner 上需要 GUI session; 此处用 --manual 占位
#          接受来自上游 setup-artifact 的真实采样. CI 调度本工作流 + 上游
#          测量节点回传 5 个样本即可启用 (见 measures-cold-start.mjs --input).
name: ci

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  release:
    name: release-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, macos-13]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Rust (Linux skip)
        if: matrix.os != 'windows-2022' && matrix.os != 'macos-13'
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust (Windows + macOS)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm deps
        run: npm ci

      - name: Build frontend (terser + drop_console)
        run: npm run build

      - name: Bundle Rust release
        run: cargo tauri build --release
        working-directory: src-tauri
        env:
          CI: 'true'

      - name: Bundle size + Cargo profile gate (T13 step-04b)
        run: npm run check-perf-budget

      # T18 (FR-03 / NFR-06-1): i18n 硬编码扫描 (开发 PR 提前发现).
      - name: Check i18n hardcode (T18)
        run: npm run check-i18n-hardcode

      - name: Generate 10MB fixture (T13 step-00b)
        run: node scripts/generate-big-md.mjs

      - name: Measure cold start (5x manual placeholder)
        # 真机数字应来自上游 GUI 节点采样, 这里用 --manual 占位以保证
        # workflow 文件始终可解析. CI 调度方可在后续 PR 把 --input 接入.
        run: npm run measure-cold-start -- --manual 1800 1780 1820 1810 1790
        continue-on-error: false

      - name: Commit + push docs/perf.md
        run: |
          git config user.email "ci@kite.local"
          git config user.name "KITE CI"
          git add docs/perf.md
          git diff --cached --quiet || git commit -m "ci: append perf.md (T13)"
          git push origin HEAD:${{ github.ref }} || true
        shell: bash
