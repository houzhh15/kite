# KITE — CI (T13 step-15a)
#
# release 任务矩阵 (windows-2022 + macos-13):
#   1. checkout + 装 Rust + npm ci + npm run build (含 check-console)
#   2. cargo tauri build --release (Rust 5 项强制参数生效)
#   3. npm run check-perf-budget (bundle 体积 + Cargo profile)
name: ci

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  release:
    name: release-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, macos-13]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Rust (Linux skip)
        if: matrix.os != 'windows-2022' && matrix.os != 'macos-13'
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust (Windows + macOS)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # `cargo tauri` is a third-party subcommand provided by `cargo-tauri`;
      # GitHub-hosted runners ship cargo + rustc but NOT this binary.
      # release.yml already installs it (step 5). ci.yml previously relied on
      # the cargo cache to have it pre-built; any cache miss (cold runner,
      # cache-key change, image bump) surfaces the bug as
      # `error: no such command: tauri`. Pin the install so it always
      # resolves before the build step.
      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: Install npm deps
        run: npm ci

      - name: Build frontend (terser + drop_console)
        run: npm run build

      - name: Bundle Rust release
        run: cargo tauri build --release
        working-directory: src-tauri
        env:
          CI: 'true'

      - name: Bundle size + Cargo profile gate (T13 step-04b)
        run: npm run check-perf-budget

      # T18 (FR-03 / NFR-06-1): i18n 硬编码扫描 (开发 PR 提前发现).
      - name: Check i18n hardcode (T18)
        run: npm run check-i18n-hardcode

      - name: Generate 10MB fixture (T13 step-00b)
        run: node scripts/generate-big-md.mjs
