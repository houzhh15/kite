# KITE — Release Workflow (T14 / F-30 / F-45)
#
# 触发：push tag `v*.*.*` 或 workflow_dispatch 手动。
# 矩阵：windows-latest + macos-latest。
# 步骤：
#   1-4 setup:  checkout + node 20 + rust stable + cargo cache
#   5       cargo install tauri-cli --locked
#   6-7     npm ci + npm run build
#   8       npm run check-bundle-config      (lint 兜底)
#   9       cargo tauri build --release      (bundles to target/release/bundle/<os>/)
#   10-11   audit-rust / audit-npm           (summary → $GITHUB_STEP_SUMMARY)
#   12      size-check                       (npm run check-perf-budget < 30MB)
#   13      sha256-artifacts
#   14-15   sign-windows / sign-macos        (conditional on CERT_*_BASE64)
#   16      upload-artifact@v4
name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional version override (must match package.json)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  release:
    name: release-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    timeout-minutes: 35
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: '-D warnings'
    steps:
      # 1
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 需要 git log / git describe

      # 2
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # 3
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # 4
      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # 5
      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      # 6
      - name: Install npm deps
        run: npm ci

      # 7
      - name: Build frontend (terser + drop_console)
        run: npm run build

      # 8
      - name: Lint bundle config (T14 step-5)
        run: npm run check-bundle-config

      # 8a — T18: i18n 硬编码扫描 (与 lint/typecheck 同级强制门禁).
      - name: Check i18n hardcode (T18 FR-03)
        run: npm run check-i18n-hardcode

      # 9
      - name: Bundle Rust release
        run: cargo tauri build --release
        working-directory: src-tauri
        env:
          CI: 'true'

      # 10 — T23.1 (FR-01 / AC-01-1, AC-01-2). Hard fail-fast on cargo audit.
      - name: Audit Rust (cargo audit)
        run: |
          cargo install cargo-audit --locked
          {
            echo "### cargo audit (${{ matrix.os }})"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          # Run twice: first to capture output for summary, second to surface exit code.
          # `|| true` keeps the first run from killing the script before we tee.
          cargo audit --deny warnings 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || CARGO_AUDIT_RC=${PIPESTATUS[0]}
          CARGO_AUDIT_RC=${CARGO_AUDIT_RC:-0}
          # Emit JSON artifact for downstream forking (T23.4 dep-audit-report-{sha}).
          mkdir -p .reports
          {
            echo "{\"ts\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\","
            echo " \"ecosystem\":\"cargo\","
            echo " \"tool\":\"cargo-audit\","
            echo " \"deny_warnings\":true,"
            echo " \"exit_code\":${CARGO_AUDIT_RC},"
            echo " \"os\":\"${{ matrix.os }}\","
            echo " \"sha\":\"${{ github.sha }}\"}"
          } > .reports/dep-audit-cargo.json
          if [ "${CARGO_AUDIT_RC}" -ne 0 ]; then
            echo "::error::cargo audit --deny warnings failed with exit ${CARGO_AUDIT_RC}"
            exit ${CARGO_AUDIT_RC}
          fi

      # 11 — T23.1 (FR-01 / AC-01-3). Hard fail-fast on npm audit High+.
      - name: Audit npm
        run: |
          {
            echo "### npm audit (${{ matrix.os }})"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          # --audit-level=high: only High/Critical fail. Lower severities are warned
          # but do not block. We intentionally omit `set +e` + `::warning::` so any
          # non-zero exit propagates and aborts the job (AC-01-3).
          npm audit --audit-level=high 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || NPM_AUDIT_RC=${PIPESTATUS[0]}
          NPM_AUDIT_RC=${NPM_AUDIT_RC:-0}
          mkdir -p .reports
          {
            echo "{\"ts\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\","
            echo " \"ecosystem\":\"npm\","
            echo " \"tool\":\"npm-audit\","
            echo " \"audit_level\":\"high\","
            echo " \"exit_code\":${NPM_AUDIT_RC},"
            echo " \"os\":\"${{ matrix.os }}\","
            echo " \"sha\":\"${{ github.sha }}\"}"
          } > .reports/dep-audit-npm.json
          if [ "${NPM_AUDIT_RC}" -ne 0 ]; then
            echo "::error::npm audit --audit-level=high failed with exit ${NPM_AUDIT_RC}"
            exit ${NPM_AUDIT_RC}
          fi

      # 10b — T23.4: bundle dep-audit-report-{sha}.json artifact (always uploaded,
      # even when audit steps fail, so investigators have a machine-readable trail).
      - name: Upload dep audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dep-audit-report-${{ github.sha }}
          path: |
            .reports/dep-audit-cargo.json
            .reports/dep-audit-npm.json
          if-no-files-found: warn
          retention-days: 30

      # 12
      - name: Size check (bundle < 30 MB)
        run: npm run check-perf-budget

      # 13
      - name: SHA256 artifacts
        shell: bash
        run: |
          {
            echo "### SHA256 (release artifacts)"
            echo ""
            echo "| File | Bytes | SHA256 |"
            echo "| --- | ---: | --- |"
            if [ -d src-tauri/target/release/bundle ]; then
              find src-tauri/target/release/bundle -type f \( -name '*.dmg' -o -name '*.msi' -o -name '*.exe' -o -name '*.app' -o -path '*/macos/*.app' \) -print0 \
                | while IFS= read -r -d '' f; do
                    bytes=$(wc -c < "$f" | tr -d ' ')
                    sha=$(sha256sum "$f" | awk '{print $1}')
                    echo "| \`$f\` | $bytes | \`$sha\` |"
                  done
            else
              echo "| _(no bundle dir)_ | | |"
            fi
          } | tee -a "$GITHUB_STEP_SUMMARY"

      # 14 — Windows signing
      - name: Sign Windows (signtool)
        if: matrix.os == 'windows-latest' && env.WINDOWS_CERT_PFX_BASE64 != ''
        shell: pwsh
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP 'signing.pfx'
          [System.IO.File]::WriteAllBytes($pfxPath, [System.Convert]::FromBase64String($env:WINDOWS_CERT_PFX_BASE64))
          Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation 'Cert:\CurrentUser\My' -Password (ConvertTo-SecureString -String $env:WINDOWS_CERT_PFX_PASSWORD -Force -AsPlainText) | Out-Null
          $signtool = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe' -ErrorAction SilentlyContinue | Sort-Object -Descending | Select-Object -First 1
          if (-not $signtool) { Write-Error "signtool.exe not found"; exit 1 }
          Get-ChildItem 'src-tauri/target/release/bundle' -Recurse -Include '*.msi','*.exe' | ForEach-Object {
            & $signtool.FullName sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f $pfxPath /p $env:WINDOWS_CERT_PFX_PASSWORD $_.FullName
          }
          Write-Host "Signed: $(Get-ChildItem 'src-tauri/target/release/bundle' -Recurse -Include '*.msi','*.exe' | Measure-Object).Count files"
        env:
          WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          WINDOWS_CERT_PFX_PASSWORD: ${{ secrets.WINDOWS_CERT_PFX_PASSWORD }}

      - name: Skip sign Windows (no secret)
        if: matrix.os == 'windows-latest' && env.WINDOWS_CERT_PFX_BASE64 == ''
        shell: pwsh
        run: |
          Write-Host "signing skipped: missing WINDOWS_CERT_PFX secrets"

      # 15 — macOS signing
      - name: Sign macOS (codesign + productsign)
        if: matrix.os == 'macos-latest' && env.MACOS_CERT_P12_BASE64 != ''
        shell: bash
        run: |
          set -e
          KEYCHAIN=build.keychain
          KEYCHAIN_PW=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PW" $KEYCHAIN
          security set-keychain-settings -lut 21600 $KEYCHAIN
          security unlock-keychain -p "$KEYCHAIN_PW" $KEYCHAIN
          security list-keychains -d user -s $KEYCHAIN $(security list-keychains -d user | tr -d '"')
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo -n "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -k $KEYCHAIN -P "$MACOS_CERT_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PW" $KEYCHAIN
          APP="src-tauri/target/release/bundle/macos/KITE.app"
          if [ ! -d "$APP" ]; then APP="src-tauri/target/release/bundle/macos/Kite.app"; fi
          if [ ! -d "$APP" ]; then echo "App bundle not found"; exit 1; fi
          codesign --force --deep --options runtime \
            --entitlements src-tauri/entitlements/entitlements.plist \
            --sign "$MACOS_SIGN_IDENTITY" "$APP"
          for dmg in src-tauri/target/release/bundle/dmg/*.dmg; do
            [ -e "$dmg" ] || continue
            productsign --sign "$MACOS_SIGN_IDENTITY" "$dmg" "${dmg%.dmg}-signed.dmg"
            mv "${dmg%.dmg}-signed.dmg" "$dmg"
          done
          security delete-keychain $KEYCHAIN
          echo "Signed: $(find src-tauri/target/release/bundle -type f \( -name '*.dmg' -o -name 'Kite.app' -o -name 'KITE.app' \) | wc -l | tr -d ' ') artifacts"
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_P12_PASSWORD: ${{ secrets.MACOS_CERT_P12_PASSWORD }}
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}

      - name: Skip sign macOS (no secret)
        if: matrix.os == 'macos-latest' && env.MACOS_CERT_P12_BASE64 == ''
        run: |
          echo "signing skipped: missing MACOS_CERT_P12 secrets"

      # 16
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kite-${{ matrix.os }}-${{ github.ref_name }}
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/Kite.app
            src-tauri/target/release/bundle/**/KITE.app
          if-no-files-found: error
          retention-days: 30